<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ESG 鏅烘眹閾惰鐗?鈥?涓浗閾惰涓欵SG缁煎悎鐩戞祴骞冲彴</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --navy:        #060f1e;
  --navy-mid:    #0c1c38;
  --navy-light:  #122a52;
  --corp-blue:   #1a3370;
  --accent-blue: #3b82f6;
  --accent2:     #06b6d4;
  --green:       #16a34a;
  --green-mid:   #86efac;
  --red:         #dc2626;
  --red-mid:     #fca5a5;
  --gold:        #d4a847;
  --gold-light:  #fde68a;
  --purple:      #7c3aed;
  --purple-mid:  #c4b5fd;
  --text-primary:   #eef2ff;
  --text-secondary: #94a3b8;
  --text-muted:     #3d5a80;
  --border:      rgba(59,130,246,0.15);
  --border2:     rgba(6,182,212,0.12);
  --glass:       rgba(12,28,56,0.75);
  --glass-hover: rgba(18,42,82,0.88);
  --card-bg:     rgba(6,15,30,0.9);
  --radius:      12px;
  --radius-lg:   18px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--navy);
  color:var(--text-primary);
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(59,130,246,0.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,130,246,0.035) 1px,transparent 1px);
  background-size:56px 56px;
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 55% 45% at 15% 0%,rgba(26,51,112,0.45) 0%,transparent 65%),
    radial-gradient(ellipse 35% 35% at 85% 95%,rgba(22,163,74,0.1) 0%,transparent 55%),
    radial-gradient(ellipse 30% 40% at 90% 10%,rgba(6,182,212,0.08) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--navy-light);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--accent-blue);}

/* ===== TOP BAR ===== */
.topbar{
  background:rgba(6,15,30,0.96);
  border-bottom:1px solid rgba(59,130,246,0.1);
  padding:0 40px;
  height:34px;
  display:flex;align-items:center;justify-content:space-between;
  font-size:11px;color:var(--text-muted);
  position:sticky;top:0;z-index:200;
}
.topbar-left{display:flex;gap:20px;align-items:center;}
.topbar-right{display:flex;gap:16px;align-items:center;}
.live-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 6px var(--green);
  animation:blink 2s ease-in-out infinite;
  display:inline-block;margin-right:5px;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.topbar-rate{color:var(--text-secondary);font-family:'DM Mono',monospace;font-size:11px;}
.topbar-rate span{color:var(--gold);}

/* ===== NAV ===== */
nav{
  position:sticky;top:34px;z-index:150;
  background:rgba(6,15,30,0.94);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;
  height:62px;
}
.nav-logo{display:flex;align-items:center;gap:12px;}
.logo-icon{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--corp-blue),var(--accent-blue));
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;
  box-shadow:0 0 20px rgba(59,130,246,0.4);
}
.logo-text{font-size:19px;font-weight:700;letter-spacing:1px;}
.logo-text span{color:var(--accent-blue);}
.logo-sub{font-size:10px;color:var(--text-muted);margin-top:1px;letter-spacing:.5px;}
.nav-links{display:flex;gap:2px;list-style:none;}
.nav-links a{
  display:block;padding:6px 13px;border-radius:8px;
  color:var(--text-secondary);text-decoration:none;
  font-size:13.5px;font-weight:500;transition:all .2s;
}
.nav-links a:hover{color:var(--text-primary);background:rgba(59,130,246,0.1);}
.nav-links a.active{color:var(--accent-blue);background:rgba(59,130,246,0.12);}
</style>
</head>
<body>
<script>
location.replace('./site/');
</script>
</body>
</html>
